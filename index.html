<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Oráculo da Cruz Celta</title>

<style>
body {
  background: radial-gradient(circle, #0a0a0a, #000000);
  color: #e8d8a8;
  font-family: Georgia, serif;
  text-align: center;
}

h1 { margin-top: 20px; }

button {
  padding: 12px 20px;
  background: linear-gradient(45deg, gold, #d4af37);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

input {
  padding:10px;
  width:200px;
  margin:5px;
  border-radius:5px;
  border:none;
}

/* GRID ORIGINAL (INTACTO) */
#board {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  grid-template-rows: repeat(4, 160px);
  gap: 12px;
  justify-content: center;
  margin: 30px auto;
}

.card {
  width: 100px;
  height: 160px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
  cursor: pointer;
  transition: transform 0.4s;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* POSIÇÕES ORIGINAIS (INTACTAS) */
.pos0 { grid-column: 2; grid-row: 2; }
.pos1 { grid-column: 2; grid-row: 2; transform: rotate(90deg); }
.pos2 { grid-column: 2; grid-row: 3; }
.pos3 { grid-column: 1; grid-row: 2; }
.pos4 { grid-column: 2; grid-row: 1; }
.pos5 { grid-column: 3; grid-row: 2; }
.pos6 { grid-column: 4; grid-row: 1; }
.pos7 { grid-column: 4; grid-row: 2; }
.pos8 { grid-column: 4; grid-row: 3; }
.pos9 { grid-column: 4; grid-row: 4; }

#output {
  max-width: 700px;
  margin: 20px auto;
}
</style>
</head>

<h1>🔮 Oráculo da Cruz Celta</h1>

<!-- LOGIN (ADICIONADO LIMPO) -->
<div id="login">

  <input id="email" type="email" placeholder="Email">
  <br>
  <input id="senha" type="password" placeholder="Senha (mínimo 6 caracteres)">
  <br><br>

  <p style="font-size:13px; opacity:0.8; max-width:320px; margin:auto;">
    Para criar sua conta pela primeira vez, digite um e-mail válido e uma senha com pelo menos 6 caracteres e clique em "Criar Conta".
  </p>

  <br>

  <button onclick="login()">Entrar</button>
  <button onclick="registrar()">Criar Conta</button>
</div>

<!-- PAGAMENTO (SEU ORIGINAL) -->
<div id="payment" style="display:none;">
  <p>🔮 Este oráculo funciona por troca energética.</p>
  <p>Contribua com R$2 via Pix:</p>
  <p><strong>CHAVE PIX: vicentecury77@gmail.com</strong></p>
  <button onclick="liberar()">Já paguei</button>

<!-- JOGO (SEU ORIGINAL) -->
<div id="game" style="display:none;">

<!-- FIREBASE SIMPLES (SEM QUEBRAR SEU ORÁCULO) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgFtlDzZDbiiQEuiSvFu0sXVLECEqjUrM",
  authDomain: "tarot-online-887e3.firebaseapp.com",
  projectId: "tarot-online-887e3",
  storageBucket: "tarot-online-887e3.firebasestorage.app",
  messagingSenderId: "345473207369",
  appId: "1:345473207369:web:86ca31f5734ac20d728398"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(()=>{
      document.getElementById("login").style.display="none";
      document.getElementById("payment").style.display="block";
    })
    .catch(e=>alert(e.message));
};

// REGISTRO
window.registrar = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(()=>{
      return signInWithEmailAndPassword(auth, email, senha);
    })
    .then(()=>{
      document.getElementById("login").style.display="none";
      document.getElementById("payment").style.display="block";
    })
    .catch(e=>alert(e.message));
};

</script>

let spread=[];

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function iniciar(){
  const board=document.getElementById("board");
  board.innerHTML="";
  document.getElementById("output").innerHTML =
  "<p><em>Concentre-se... o oráculo começa a se alinhar...</em></p>";

  spread = shuffle([...cards]).slice(0,10);

  spread.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="card pos"+i;

    div.innerHTML = `<img src="img/verso.jpg">`;

    div.onclick=()=>revelar(div,c,posicoes[i]);

    board.appendChild(div);
  });
}

function revelar(div,carta,pos){
  if(div.classList.contains("revealed")) return;

  div.classList.add("revealed");

  const invertida = Math.random() < 0.5;

  if(invertida){
    div.style.transform += " rotate(180deg)";
  }

  div.innerHTML = `<img src="${carta.img}">`;

  let energia = invertida ? carta.sombra : carta.luz;

  document.getElementById("output").innerHTML += `
  <p><strong>${pos}</strong></p>
  <p><strong>${carta.nome}</strong>${invertida ? " (invertida)" : ""}</p>
  <p>${energia}</p>
  <hr>
  `;
