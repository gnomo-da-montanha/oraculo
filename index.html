<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tarot Online - Oráculo da Cruz Celta</title>

<style>
body {
  background: radial-gradient(circle, #0a0a0a, #000000);
  color: #e8d8a8;
  font-family: Georgia, serif;
  text-align: center;
}

h1 { margin-top: 20px; }

button {
  padding: 12px 20px;
  background: linear-gradient(45deg, gold, #d4af37);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

input {
  padding:10px;
  width:200px;
  margin:5px;
  border-radius:5px;
  border:none;
}

#board {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  grid-template-rows: repeat(4, 160px);
  gap: 12px;
  justify-content: center;
  margin: 30px auto;
}

.card {
  width: 100px;
  height: 160px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.pos0 { grid-column: 2; grid-row: 2; z-index: 2; }
.pos1 { grid-column: 2; grid-row: 2; transform: rotate(90deg); z-index: 5; }
.pos2 { grid-column: 2; grid-row: 3; }
.pos3 { grid-column: 1; grid-row: 2; }
.pos4 { grid-column: 2; grid-row: 1; }
.pos5 { grid-column: 3; grid-row: 2; }
.pos6 { grid-column: 4; grid-row: 1; }
.pos7 { grid-column: 4; grid-row: 2; }
.pos8 { grid-column: 4; grid-row: 3; }
.pos9 { grid-column: 4; grid-row: 4; }

#output {
  max-width: 700px;
  margin: 20px auto;
}

/* 🔥 NOVO: área do PIX */
#pixArea {
  margin-top: 15px;
}
#pixArea img {
  width: 200px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🔮 Tarot Online - Oráculo da Cruz Celta</h1>

<div id="login">
 <p>🔐 Acesse o Oráculo</p>

<input id="email" type="email" placeholder="Email">
<br>
<input id="senha" type="password" placeholder="Senha (mínimo 6 caracteres)">
<br><br>

<p style="font-size:13px; opacity:0.8; max-width:320px; margin:auto;">
  Para criar sua conta pela primeira vez, digite um e-mail válido e uma senha com pelo menos 6 caracteres.
</p>

<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar Conta</button>
</div>

<div id="payment" style="display:none;">
  <p>🔮 Pagamento por leitura</p>
  <p><strong>R$ 5,00 por consulta</strong></p>

  <button onclick="pagarPagSeguro()">Pagar e liberar leitura</button>

  <!-- 🔥 NOVO: PIX -->
  <div id="pixArea" style="display:none;">
    <p>Escaneie o PIX:</p>
    <img id="pixQr" src="">
    <p id="pixCode" style="font-size:12px; word-break:break-all;"></p>
  </div>
</div>

<div id="game" style="display:none;">
  <button onclick="iniciar()">Abrir o Oráculo</button>
  <div id="board"></div>
  <div id="output"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgFtlDzZDbiiQEuiSvFu0sXVLECEqjUrM",
  authDomain: "tarot-online-887e3.firebaseapp.com",
  projectId: "tarot-online-887e3",
  storageBucket: "tarot-online-887e3.firebasestorage.app",
  messagingSenderId: "345473207369",
  appId: "1:345473207369:web:86ca31f5734ac20d728398"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("payment").style.display = "block";
    })
    .catch(e => alert(e.message));
};

window.registrar = function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(() => signInWithEmailAndPassword(auth, email, senha))
    .then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("payment").style.display = "block";
    })
    .catch(e => alert(e.message));
};
</script>

<script>

let readId = null;
let spread = [];
let pagando = false;
let executando = false;

/* PAGAMENTO REAL + PIX */
function pagarPagSeguro(){

  if(pagando) return;
  pagando = true;

  fetch("https://oraculo-backend-spif.onrender.com/criar-pagamento", {
    method: "POST"
  })
  .then(r => r.json())
  .then(data => {

    readId = data.readId;

    if(!readId){
      alert("Erro ao gerar leitura.");
      return;
    }

    // 🔥 MOSTRAR PIX
    document.getElementById("pixArea").style.display = "block";
    document.getElementById("pixQr").src = data.qr;
    document.getElementById("pixCode").innerText = data.pix;

    // 🔥 LIBERA O JOGO (depois você pode travar até confirmar pagamento)
    document.getElementById("payment").style.display = "none";
    document.getElementById("game").style.display = "block";

  })
  .catch(err => {
    alert("Erro de conexão.");
    console.error(err);
  })
  .finally(() => pagando = false);
}

/* INICIAR */
function iniciar(){

  if(executando) return;
  executando = true;

  if(!readId){
    alert("Sessão inválida.");
    document.getElementById("game").style.display = "none";
    document.getElementById("payment").style.display = "block";
    executando = false;
    return;
  }

  fetch("https://oraculo-backend-spif.onrender.com/check-read", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ readId })
  })
  .then(r => r.json())
  .then(res => {

    if(!res.valid){
      alert("Pagamento necessário para nova leitura.");
      document.getElementById("game").style.display = "none";
      document.getElementById("payment").style.display = "block";
      executando = false;
      return;
    }

    iniciarOraculoReal();

    fetch("https://oraculo-backend-spif.onrender.com/use-read", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ readId })
    });

  })
  .catch(err => {
    alert("Erro ao validar leitura.");
    console.error(err);
  })
  .finally(() => executando = false);
}

/* ORÁCULO */
function iniciarOraculoReal(){

  const board = document.getElementById("board");
  const output = document.getElementById("output");

  board.innerHTML = "";
  output.innerHTML = "";

  spread = shuffle([...cards]).slice(0,10);

  for(let i=0;i<10;i++){
    const div = document.createElement("div");
    div.className = "card pos" + i;

    div.innerHTML = `<img src="img/verso.jpg">`;
    div.onclick = () => revelar(div, spread[i], posicoes[i]);

    board.appendChild(div);
  }
}

/* CARTAS (INALTERADO) */
const cards = [
{nome:"O Louco",img:"img/louco.jpg",luz:"Um chamado para abandonar o controle e atravessar o desconhecido. A vida exige um salto que não pode ser calculado.",sombra:"Um movimento impulsivo ou fuga da realidade. Você pode estar avançando sem ver onde pisa."},
{nome:"O Mago",img:"img/mago.jpg",luz:"Você tem em mãos os instrumentos necessários. A realidade pode ser moldada pela sua intenção.",sombra:"Manipulação, ilusão ou tentativa de controlar demais a situação."},
{nome:"A Sacerdotisa",img:"img/sacerdotisa.jpg",luz:"Há algo sendo revelado no silêncio. A resposta não está fora, mas dentro de você.",sombra:"Negação da própria intuição. Você já percebe, mas evita encarar."},
{nome:"A Imperatriz",img:"img/imperatriz.jpg",luz:"Um ciclo de crescimento e criação se abre. Algo quer nascer através de você.",sombra:"Excesso, acomodação ou apego ao conforto."},
{nome:"O Imperador",img:"img/imperador.jpg",luz:"É hora de estruturar, assumir controle e estabelecer ordem.",sombra:"Rigidez, controle excessivo ou imposição sobre os outros."},
{nome:"O Hierofante",img:"img/hierofante.jpg",luz:"Existe sabedoria em tradições e caminhos já trilhados. Um ensinamento pode ser acessado.",sombra:"Dogma, crenças limitantes ou submissão cega."},
{nome:"Os Enamorados",img:"img/enamorados.jpg",luz:"Uma escolha alinhada com a verdade do seu coração se apresenta.",sombra:"Indecisão profunda ou conflito interno."},
{nome:"O Carro",img:"img/carro.jpg",luz:"A direção está clara. Avançar agora é necessário.",sombra:"Falta de controle ou avanço sem direção."},
{nome:"A Força",img:"img/forca.jpg",luz:"Domínio interior. A verdadeira força nasce do equilíbrio emocional.",sombra:"Explosões emocionais ou repressão excessiva."},
{nome:"O Eremita",img:"img/eremita.jpg",luz:"Um recolhimento necessário. A resposta se revela na introspecção.",sombra:"Isolamento ou fuga do mundo."}
];

const posicoes = [
"Véu Presente","Força que Cruza","Raiz Oculta","Sombra do Passado",
"Eco do Destino","Portal Imediato","Espelho do Eu","Correntes do Mundo",
"Abismo e Luz","Selo do Desfecho"
];

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function revelar(div, carta, pos){
  if(div.classList.contains("ok")) return;

  div.classList.add("ok");

  const invertida = Math.random() < 0.5;

  div.innerHTML = `<img src="${carta.img}" class="card-img">`;

  const img = div.querySelector("img");

  if(invertida){
    img.style.transform = "rotate(180deg)";
  }

  document.getElementById("output").innerHTML += `
    <p><b>${pos}</b></p>
    <p><b>${carta.nome}</b> ${invertida ? "(invertida)" : ""}</p>
    <p>${invertida ? carta.sombra : carta.luz}</p>
    <hr>
  `;
}

</script>

</body>
</html>
